# deploy-pages.yml
#
# Deploys the Airport Announcement Voice Builder to GitHub Pages.
#
# The site is a static single-page app (no build step required), so
# the workflow simply uploads the repository contents as a Pages artifact
# and deploys them.
#
# HOW TO ENABLE THIS
# ──────────────────
# 1. Go to Settings → Pages in your repository.
# 2. Under "Build and deployment", set Source to "GitHub Actions".
# 3. The next push to the `main` branch (or manual trigger) will deploy.
#
# The deployed site will be available at:
#   https://<owner>.github.io/<repo>/

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  # Allow a manual trigger from the Actions tab
  workflow_dispatch:

# Allow only one concurrent deployment; cancel in-progress runs so the
# latest push always wins.
concurrency:
  group: pages
  cancel-in-progress: true

# Grant the GITHUB_TOKEN the permissions required by the Pages actions.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire repo root — index.html, css/, js/ are all here.
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
